name = "ai-seo-worker"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 20 * * *"] # 3AM Vietnam (UTC+7) = 20:00 UTC

[[workflows]]
binding = "SEO_WORKFLOW"
name = "ai-seo-workflow"
class_name = "SEOContentWorkflow"

# npx wrangler r2 bucket create betterme-content
[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "betterme-content"

# npx wrangler vectorize create betterme-articles --dimensions=1024 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "betterme-articles"
dimensions = 1024
metric = "cosine"

[ai]
binding = "AI"

# Secrets (set via: npx wrangler secret put <KEY>)
# GCP_PRIVATE_KEY        - service account private key PEM
# GCP_SERVICE_ACCOUNT    - service account email
# GCP_PROJECT_ID         - GCP project ID
# GCP_REGION             - Vertex AI region (e.g. us-central1)
# DISCORD_WEBHOOK_URL    - Discord webhook for notifications
# INTERNAL_SECRET        - secret for manual HTTP trigger