# VPS system nginx config for livekit.betterme.dev
#
# Deploy steps:
# 1. Copy to VPS: scp others/nginx/livekit.betterme.dev.conf root@<vps>:/etc/nginx/sites-available/livekit.betterme.dev
# 2. Enable: ln -s /etc/nginx/sites-available/livekit.betterme.dev /etc/nginx/sites-enabled/
# 3. Get SSL cert: certbot --nginx -d livekit.betterme.dev
# 4. Reload: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name livekit.betterme.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name livekit.betterme.dev;

    ssl_certificate /etc/letsencrypt/live/livekit.betterme.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.betterme.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for LiveKit RTC)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent WebRTC/WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}
