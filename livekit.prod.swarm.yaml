# LiveKit config cho Docker Swarm deployment
# network_mode: host bị Swarm bỏ qua — cả hai service chạy trên overlay network
# nên dùng service name 'redis' thay vì 127.0.0.1
#
# QUAN TRỌNG: File này KHÔNG hỗ trợ ${ENV_VAR} substitution.
# - API keys được set qua env var LIVEKIT_KEYS trong docker-compose (không dùng section 'keys' ở đây)
# - Webhook URL cần sửa trực tiếp ở đây

port: 7880

redis:
  address: redis:6379

rtc:
  port_range_start: 50000
  port_range_end: 60000
  tcp_port: 7881
  use_external_ip: true

logging:
  level: info
  json: true
  sample: true

webhook:
  # api_key phải khớp với key name trong LIVEKIT_KEYS env var
  api_key: "devkey"
  urls:
    - "https://api.betterme.study/api/v2/webhooks/livekit"

room:
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 0
