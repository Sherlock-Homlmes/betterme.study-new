# LiveKit config cho Docker Swarm deployment
# Dùng 127.0.0.1 thay vì hostname 'redis' vì cả hai service đều dùng network_mode: host
#
# QUAN TRỌNG: File này KHÔNG hỗ trợ ${ENV_VAR} substitution.
# - API keys được set qua env var LIVEKIT_KEYS trong docker-compose (không dùng section 'keys' ở đây)
# - Redis password được set qua env var REDIS_PASSWORD trong docker-compose
# - Webhook URL cần sửa trực tiếp ở đây

port: 7880

redis:
  address: 127.0.0.1:6379
  # password set qua env REDIS_PASSWORD trong compose, không đặt ở đây

rtc:
  port_range_start: 50000
  port_range_end: 60000
  tcp_port: 7881
  use_external_ip: true

logging:
  level: info
  json: true
  sample: true

webhook:
  # api_key phải khớp với key name trong LIVEKIT_KEYS env var
  api_key: "devkey"
  urls:
    - "http://server:8080/api/v2/webhooks/livekit"

room:
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 0
