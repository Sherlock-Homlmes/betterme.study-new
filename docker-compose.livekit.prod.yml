version: "3.9"

# LiveKit Production Stack — Docker Swarm
#
# network_mode: host bị Swarm bỏ qua hoàn toàn → không dùng nữa.
# Dùng overlay network "livekit-net" để Redis và LiveKit giao tiếp qua DNS service name.
# UDP 50000-60000 dùng ingress mode (host port) để traffic đi thẳng vào container.
#
# Deploy: bash deploy-swarm.sh
# Remove: docker stack rm livekit-stack

networks:
  livekit-net:
    driver: overlay
    attachable: true

services:
  redis:
    image: redis:7-alpine
    networks:
      - livekit-net
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - livekit-redis-data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 600M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  livekit:
    image: livekit/livekit-server:latest
    networks:
      - livekit-net
    ports:
      - target: 7880
        published: 7880
        protocol: tcp
        mode: host
      - target: 7881
        published: 7881
        protocol: tcp
        mode: host
      - target: 50000
        published: 50000
        protocol: udp
        mode: host
      - target: 60000
        published: 60000
        protocol: udp
        mode: host
    volumes:
      - ./livekit.prod.swarm.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "devkey: ${LIVEKIT_SECRET:-secretsecret}"
      WEBHOOK_URL: "${WEBHOOK_URL:-http://localhost:8080/api/v2/webhooks/livekit}"
    command: ["--config", "/etc/livekit.yaml"]
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  livekit-redis-data:
    driver: local
