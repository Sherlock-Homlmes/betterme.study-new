version: "3.9"

# LiveKit Production Stack — Docker Swarm
#
# Cả hai service dùng network_mode: host vì:
# 1. LiveKit cần expose dải UDP 50000-60000 (Swarm ingress mesh không hỗ trợ port range)
# 2. LiveKit cần biết public IP thật để quảng bá ICE candidates (use_external_ip: true)
# 3. Redis bind 127.0.0.1 — không expose ra ngoài internet
#
# Deploy: bash deploy-swarm.sh
# Remove: docker stack rm livekit-stack

services:
  redis:
    image: redis:7-alpine
    network_mode: host
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - livekit-redis-data:/data
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      placement:
        # Redis chỉ chạy trên manager node để tránh data split
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 600M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    volumes:
      # Config dùng 127.0.0.1:6379 cho Redis (xem livekit.prod.swarm.yaml)
      - ./livekit.prod.swarm.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "devkey: ${LIVEKIT_SECRET:-secretsecret}"
      WEBHOOK_URL: "${WEBHOOK_URL:-http://localhost:8080/api/v2/webhooks/livekit}"
    command: ["--config", "/etc/livekit.yaml"]
    restart: unless-stopped
    deploy:
      # global = một instance trên mỗi swarm node (scale ngang tự nhiên)
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  livekit-redis-data:
    driver: local
