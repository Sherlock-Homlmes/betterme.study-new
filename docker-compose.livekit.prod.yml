version: "3.9"

# LiveKit Production Stack — Docker Swarm
#
# network_mode: host bị Swarm bỏ qua hoàn toàn → không dùng nữa.
# Dùng overlay network "livekit-net" để Redis và LiveKit giao tiếp qua DNS service name.
# UDP 7882-7892 dùng host mode — khớp với udp_port mux trong livekit.prod.swarm.yaml.
#
# Deploy: bash deploy-swarm.sh
# Remove: docker stack rm livekit-stack

networks:
  livekit-net:
    driver: overlay
    attachable: true

services:
  caddy:
    image: caddy:2-alpine
    networks:
      - livekit-net
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - ./Caddyfile.livekit:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    networks:
      - livekit-net
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - livekit-redis-data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 600M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  livekit:
    image: livekit/livekit-server:latest
    networks:
      - livekit-net
    ports:
      - target: 7880
        published: 7880
        protocol: tcp
        mode: host
      - target: 7881
        published: 7881
        protocol: tcp
        mode: host
      - target: 7882
        published: 7882
        protocol: udp
        mode: host
      - target: 7883
        published: 7883
        protocol: udp
        mode: host
      - target: 7884
        published: 7884
        protocol: udp
        mode: host
      - target: 7885
        published: 7885
        protocol: udp
        mode: host
      - target: 7886
        published: 7886
        protocol: udp
        mode: host
      - target: 7887
        published: 7887
        protocol: udp
        mode: host
      - target: 7888
        published: 7888
        protocol: udp
        mode: host
      - target: 7889
        published: 7889
        protocol: udp
        mode: host
      - target: 7890
        published: 7890
        protocol: udp
        mode: host
      - target: 7891
        published: 7891
        protocol: udp
        mode: host
      - target: 7892
        published: 7892
        protocol: udp
        mode: host
    volumes:
      - ./livekit.prod.swarm.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "devkey: ${LIVEKIT_SECRET:-secretsecret}"
      WEBHOOK_URL: "${WEBHOOK_URL:-http://localhost:8080/api/v2/webhooks/livekit}"
    command: ["--config", "/etc/livekit.yaml"]
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  livekit-redis-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
